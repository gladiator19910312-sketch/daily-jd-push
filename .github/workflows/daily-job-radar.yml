name: Daily Agent Job Radar
run-name: ${{ inputs.dispatch_id && format('Agent Reach {0}', inputs.dispatch_id) || 'Daily Agent Job Radar' }}

on:
  schedule:
    # 00:30 UTC = 08:30 Asia/Shanghai
    - cron: "30 0 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Only print the report; do not send DingTalk"
        type: boolean
        default: true
      force_all:
        description: "Ignore the seen-job cache"
        type: boolean
        default: false
      agent_reach_supplement_b64:
        description: "Optional base64-encoded sanitized Agent Reach JSON (never include cookies or tokens)"
        type: string
        required: false
        default: ""
      dispatch_id:
        description: "Optional non-secret correlation id for local automation"
        type: string
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: daily-agent-job-radar
  cancel-in-progress: false

jobs:
  scan-and-notify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DRY_RUN: ${{ inputs.dry_run || 'false' }}
      FORCE_ALL: ${{ inputs.force_all || 'false' }}
      SKIP_IF_RECENT_PUSH_HOURS: ${{ github.event_name == 'schedule' && '2' || '0' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Reject committed credentials
        run: |
          if git grep -nE 'access_token=[0-9a-fA-F]{32,}|SEC[0-9A-Za-z]{32,}' -- .; then
            echo "Potential credential committed to the repository."
            exit 1
          fi

      - name: Restore seen-job cache
        uses: actions/cache@v4
        with:
          path: .cache/seen_jobs.json
          key: job-radar-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            job-radar-${{ runner.os }}-

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Prepare sanitized Agent Reach supplement
        id: agent-reach-supplement
        shell: bash
        env:
          AGENT_REACH_SUPPLEMENT_B64: ${{ inputs.agent_reach_supplement_b64 || '' }}
        run: |
          set -euo pipefail
          supplement_path="$RUNNER_TEMP/agent-reach-supplement.json"
          if [[ -n "$AGENT_REACH_SUPPLEMENT_B64" ]]; then
            umask 077
            printf '%s' "$AGENT_REACH_SUPPLEMENT_B64" | base64 --decode > "$supplement_path"
            chmod 600 "$supplement_path"
            echo "path=$supplement_path" >> "$GITHUB_OUTPUT"
          else
            echo "path=" >> "$GITHUB_OUTPUT"
          fi

      - name: Scan and notify
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          CURRENT_FIXED_CASH_WAN: ${{ secrets.CURRENT_FIXED_CASH_WAN }}
          TARGET_TOTAL_COMP_WAN: ${{ secrets.TARGET_TOTAL_COMP_WAN }}
          AGENT_REACH_SUPPLEMENT_PATH: ${{ steps.agent-reach-supplement.outputs.path }}
        shell: bash
        run: |
          set -euo pipefail
          args=(python job_radar.py --config config.json)
          if [[ -n "${AGENT_REACH_SUPPLEMENT_PATH:-}" ]]; then
            args+=(--supplement "$AGENT_REACH_SUPPLEMENT_PATH" --require-supplement)
          fi
          "${args[@]}"
